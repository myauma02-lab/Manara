version: '3.8'

services:
  # ─── PostgreSQL Database ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: manara_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: manara_db
    ports:
      - "5432:5432"
    volumes:
      - manara_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: manara_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:akshUwzUptRWaGsjrXKBJWuJnJKxvblo@postgres.railway.internal:5432/railway
      JWT_SECRET: ${JWT_SECRET}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      FRONTEND_URL: https://manara-jet.vercel.app
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - manara_uploads:/app/uploads

  # ─── Frontend ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://manara-backend.up.railway.app
    container_name: manara_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  manara_pgdata:
  manara_uploads:
